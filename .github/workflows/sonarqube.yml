$ymlContent = @"
name: SonarCloud_NET
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  analysis:
    name: Analisis de Codigo
    runs-on: windows-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Install SonarScanner
        shell: powershell
        run: |
          if (!(Test-Path "${{ runner.temp }}\scanner")) {
            New-Item -Path "${{ runner.temp }}\scanner" -ItemType Directory
          }
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner

      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          & "${{ runner.temp }}\scanner\dotnet-sonarscanner" begin /k:"LuisaC2087_BadCleanArch" /o:"luisac2087" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io"
          dotnet build
          & "${{ runner.temp }}\scanner\dotnet-sonarscanner" end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
"@

$ymlContent | Out-File -FilePath .github/workflows/sonarqube.yml -Encoding utf8